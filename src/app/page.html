<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Toque & Spatule | Ustensiles de Cuisine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; color: #333; }
        header { background: #fff; padding: 20px; border-bottom: 2px solid #e67e22; text-align: center; }
        nav a { margin: 0 15px; text-decoration: none; color: #333; font-weight: bold; }
        .hero { background: #fdf2e9; padding: 60px; text-align: center; }
        .products { display: flex; justify-content: space-around; padding: 40px; }
        .card { border: 1px solid #ddd; border-radius: 8px; width: 25%; padding: 15px; text-align: center; }
        .btn { background: #e67e22; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        .price { color: #e67e22; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Toque & Spatule</h1>
    <nav>
        <a href="#">Pâtisserie</a>
        <a href="#">Cuisine</a>
        <a href="#">Promotions</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Le meilleur pour vos créations gourmandes</h2>
    <p>Des ustensiles de qualité professionnelle pour les passionnés.</p>
</section>

<section class="products">
    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Moule Silicone">
        <h3>Moule à Entremets</h3>
        <p class="price">24,90 €</p>
        <button class="btn">Ajouter au panier</button>
    </div>
    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Couteau Chef">
        <h3>Couteau de Chef Japonais</h3>
        <p class="price">89,00 €</p>
        <button class="btn">Ajouter au panier</button>
    </div>
    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Fouet">
        <h3>Fouet Professionnel</h3>
        <p class="price">12,50 €</p>
        <button class="btn">Ajouter au panier</button>
    </div>
</section>

</body>
</html>
